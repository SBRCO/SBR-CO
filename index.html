<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBR&CO - Live Trading Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #05060f; font-family: 'Segoe UI', monospace;
         touch-action: none; }
  #hud {
    position: fixed; top: 12px; left: 12px; color: #9fd8ff; z-index: 10;
    background: rgba(5,10,25,0.8); padding: 14px 18px; border-radius: 12px;
    border: 1px solid #1c3a5f; font-size: 13px; line-height: 1.7; max-width: 300px;
  }
  #hud h1 {
    font-size: 22px; letter-spacing: 4px; margin-bottom: 2px;
    background: linear-gradient(90deg, #22ff88, #33aaff, #ff44aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 900;
  }
  #hud .sub { color: #5f7ea6; font-size: 10px; letter-spacing: 2px; margin-bottom: 8px; }
  #hud .row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
  #updated { color: #6f86a8; font-size: 11px; margin-top: 8px; }
  #err { color: #ff7a7a; font-size: 12px; margin-top: 6px; display: none; }
  #signals {
    position: fixed; top: 12px; right: 12px; z-index: 10; max-width: 320px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sig {
    background: rgba(5,15,30,0.85); border-radius: 10px; padding: 10px 14px;
    font-size: 12px; color: #fff; border-left: 4px solid #22ff88;
    animation: slideIn 0.4s ease;
  }
  .sig.sell   { border-left-color: #ff4455; }
  .sig.reentry{ border-left-color: #33aaff; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  #tip { position: fixed; bottom: 10px; left: 12px; color: #5f7ea6; font-size: 11px; z-index: 10; }
  @media (max-width: 600px) {
    #hud { padding: 10px 12px; max-width: 220px; }
    #hud h1 { font-size: 17px; }
    #signals { max-width: 200px; top: auto; bottom: 40px; }
  }
</style>
</head>
<body>
<div id="hud">
  <h1>SBR&amp;CO</h1>
  <div class="sub">LIVE TRADING UNIVERSE</div>
  <div class="row"><span class="dot" style="background:#22ff88"></span> Kaufzone (0.786&ndash;0.886)</div>
  <div class="row"><span class="dot" style="background:#33aaff"></span> Re-Entry (0.236&ndash;0.382)</div>
  <div class="row"><span class="dot" style="background:#ff4455"></span> Verkauf Zone (TP)</div>
  <div class="row"><span class="dot" style="background:#8899aa"></span> Neutral</div>
  <div id="updated">Verbinde mit Bot ...</div>
  <div id="err"></div>
</div>
<div id="signals"></div>
<div id="tip">Ziehen = drehen | Pinch/Scroll = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// SBR&CO - LIVE TRADING UNIVERSE
// Liest status.json aus dem gleichen Repo
// ============================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060f);
scene.fog = new THREE.Fog(0x05060f, 45, 130);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x334466, 1.3));
const sun = new THREE.DirectionalLight(0xaaccff, 1.0);
sun.position.set(20, 40, 10);
scene.add(sun);

const grid = new THREE.GridHelper(140, 46, 0x1c3a5f, 0x0c1830);
scene.add(grid);

// Neon Ringe
function neonRing(radius, color, y) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(radius, 0.07, 8, 120),
    new THREE.MeshBasicMaterial({ color })
  );
  ring.rotation.x = Math.PI/2;
  ring.position.y = y;
  scene.add(ring);
  return ring;
}
const buyRing  = neonRing(17, 0x22ff88, 0.05);
const outerRing = neonRing(26, 0x112a44, 0.03);

// Sterne
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 600; i++) {
  starPos.push((Math.random()-0.5)*300, Math.random()*120+10, (Math.random()-0.5)*300);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.35 })));

// ============================================
// KAMERA: Maus + Touch
// ============================================
let camAngle = 0, camHeight = 20, camDist = 46;
let dragging = false, lastX = 0, lastY = 0, lastPinch = 0;

function startDrag(x, y) { dragging = true; lastX = x; lastY = y; }
function moveDrag(x, y) {
  if (!dragging) return;
  camAngle  -= (x - lastX) * 0.005;
  camHeight = Math.max(4, Math.min(65, camHeight + (y - lastY) * 0.08));
  lastX = x; lastY = y;
}
addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
addEventListener('mouseup', () => dragging = false);
addEventListener('wheel', e => {
  camDist = Math.max(16, Math.min(95, camDist + e.deltaY * 0.03));
});
addEventListener('touchstart', e => {
  if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
  if (e.touches.length === 2) {
    lastPinch = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: false });
addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  if (e.touches.length === 2) {
    const p = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    camDist = Math.max(16, Math.min(95, camDist - (p - lastPinch) * 0.08));
    lastPinch = p;
  }
}, { passive: false });
addEventListener('touchend', () => dragging = false);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ============================================
// TOKEN TUERME
// ============================================
const towers = {};
const STATUS_COLORS = {
  "KAUFZONE": 0x22ff88,
  "REENTRY":  0x33aaff,
  "VERKAUF":  0xff4455,
  "NEUTRAL":  0x8899aa,
};

function makeLabel() {
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 128;
  const tex = new THREE.CanvasTexture(cv);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(9.5, 2.4, 1);
  sprite.userData = { cv, ctx: cv.getContext('2d'), tex };
  return sprite;
}

function updateLabel(sprite, lines, color) {
  const { cv, ctx, tex } = sprite.userData;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = 'rgba(5,12,28,0.75)';
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = color; ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, cv.width-4, cv.height-4);
  ctx.fillStyle = color;
  ctx.font = 'bold 40px monospace';
  ctx.fillText(lines[0] || '', 16, 50);
  ctx.font = '30px monospace';
  ctx.fillStyle = '#9fd8ff';
  ctx.fillText(lines[1] || '', 16, 96);
  tex.needsUpdate = true;
}

function fmtPrice(p) {
  if (p >= 1) return '$' + p.toFixed(3);
  if (p >= 0.001) return '$' + p.toFixed(5);
  return '$' + p.toFixed(8);
}

function buildTower(symbol, index, total) {
  const angle = (index / total) * Math.PI * 2;
  const r = 17;
  const x = Math.cos(angle) * r, z = Math.sin(angle) * r;

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 1, 2.4),
    new THREE.MeshStandardMaterial({ color: 0x8899aa, emissive: 0x111a2a, metalness: 0.5, roughness: 0.3 })
  );
  mesh.position.set(x, 0.5, z);
  scene.add(mesh);

  const glow = new THREE.Mesh(
    new THREE.CylinderGeometry(2.2, 2.2, 0.15, 24),
    new THREE.MeshBasicMaterial({ color: 0x8899aa, transparent: true, opacity: 0.5 })
  );
  glow.position.set(x, 0.08, z);
  scene.add(glow);

  const label = makeLabel();
  label.position.set(x, 4, z);
  scene.add(label);

  towers[symbol] = { mesh, glow, label, targetH: 1, targetColor: new THREE.Color(0x8899aa), pulse: 0 };
}

// ============================================
// SIGNAL FEED (rechts)
// ============================================
let lastSignals = {};
function showSignal(token) {
  const key = token.symbol + token.status;
  if (lastSignals[key]) return;
  lastSignals[key] = true;

  const div = document.createElement('div');
  div.className = 'sig' + (token.status === 'VERKAUF' ? ' sell' : token.status === 'REENTRY' ? ' reentry' : '');
  const labels = { KAUFZONE: 'EINSTIEG', REENTRY: 'RE-ENTRY', VERKAUF: 'VERKAUF ZONE' };
  div.innerHTML = '<b>' + labels[token.status] + '</b> ' + token.symbol + ' @ ' + fmtPrice(token.price);
  document.getElementById('signals').prepend(div);
  setTimeout(() => div.remove(), 60000);
}

// ============================================
// STATUS LADEN
// ============================================
async function loadStatus() {
  try {
    const res = await fetch('status.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('updated').textContent = 'Bot Update: ' + data.updated;
    document.getElementById('err').style.display = 'none';

    const tokens = data.tokens || [];
    tokens.forEach((t, i) => {
      if (!towers[t.symbol]) buildTower(t.symbol, i, tokens.length);
      const tw = towers[t.symbol];

      const d = t.zone_dist_pct;
      let h = 2 + Math.max(0, Math.min(50, Math.abs(d))) * 0.24;
      if (t.status === 'KAUFZONE') h = 2.2;
      tw.targetH = h;

      const col = STATUS_COLORS[t.status] || 0x8899aa;
      tw.targetColor = new THREE.Color(col);
      tw.pulse = (t.status !== 'NEUTRAL') ? 1 : 0;

      if (t.status !== 'NEUTRAL') showSignal(t);

      const rsiStr = (t.rsi != null) ? ('RSI ' + t.rsi.toFixed(0)) : 'RSI ?';
      const distStr = (d >= 0 ? '+' : '') + d.toFixed(1) + '%';
      updateLabel(tw.label, [t.symbol + '  ' + fmtPrice(t.price), rsiStr + ' | Zone ' + distStr],
        '#' + tw.targetColor.getHexString());
    });
  } catch (e) {
    const err = document.getElementById('err');
    err.style.display = 'block';
    err.textContent = 'Warte auf Bot-Daten (status.json) ...';
  }
}
loadStatus();
setInterval(loadStatus, 15000);

// ============================================
// ANIMATION
// ============================================
let t0 = 0;
function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min((t - t0) / 1000, 0.1); t0 = t;

  if (!dragging) camAngle += dt * 0.05;
  camera.position.set(Math.cos(camAngle)*camDist, camHeight, Math.sin(camAngle)*camDist);
  camera.lookAt(0, 3, 0);

  buyRing.material.color.setHSL(0.38, 1, 0.5 + Math.sin(t*0.002)*0.15);

  for (const sym in towers) {
    const tw = towers[sym];
    const newH = tw.mesh.scale.y + (tw.targetH - tw.mesh.scale.y) * 0.08;
    tw.mesh.scale.y = newH;
    tw.mesh.position.y = newH / 2;
    tw.label.position.y = newH + 2.2;

    tw.mesh.material.color.lerp(tw.targetColor, 0.08);
    tw.glow.material.color.lerp(tw.targetColor, 0.08);
    tw.mesh.material.emissive.copy(tw.mesh.material.color).multiplyScalar(0.35);

    if (tw.pulse > 0) {
      tw.glow.material.opacity = 0.5 + Math.abs(Math.sin(t * 0.004)) * 0.5;
      tw.glow.scale.setScalar(1 + Math.sin(t * 0.004) * 0.15);
    } else {
      tw.glow.material.opacity = 0.35;
      tw.glow.scale.setScalar(1);
    }
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
