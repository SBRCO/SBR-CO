<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBR&CO - Live Trading Island</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #9ed4f0; font-family: 'Segoe UI', monospace; touch-action: none; }
  #hud {
    position: fixed; top: 12px; left: 12px; color: #163a5f; z-index: 10;
    background: rgba(255,255,255,0.85); padding: 12px 16px; border-radius: 14px;
    border: 2px solid #ffffff; font-size: 12px; line-height: 1.7; max-width: 280px;
    box-shadow: 0 4px 20px rgba(0,60,120,0.2);
  }
  #hud h1 {
    font-size: 22px; letter-spacing: 4px; margin-bottom: 2px;
    background: linear-gradient(90deg, #11bb66, #2288ee, #ee44aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900;
  }
  #hud .sub { color: #5a7a9a; font-size: 10px; letter-spacing: 2px; margin-bottom: 6px; }
  #hud .row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  #updated { color: #6a8aaa; font-size: 10px; margin-top: 6px; }
  #err { color: #cc3344; font-size: 11px; margin-top: 4px; display: none; }
  #tip { position: fixed; bottom: 10px; left: 12px; color: #2a5a8a; font-size: 11px; z-index: 10;
         background: rgba(255,255,255,0.65); padding: 4px 10px; border-radius: 10px; }
  #panel {
    position: fixed; right: 12px; bottom: 12px; z-index: 20; width: 320px; max-width: calc(100vw - 24px);
    background: rgba(255,255,255,0.95); border: 2px solid #fff; border-radius: 16px;
    padding: 16px 18px; color: #163a5f; font-size: 13px; line-height: 1.8;
    transform: translateY(120%); transition: transform 0.3s ease;
    box-shadow: 0 8px 40px rgba(0,60,120,0.3);
  }
  #panel.open { transform: none; }
  #panel h2 { font-size: 20px; letter-spacing: 2px; margin-bottom: 2px; }
  #panel .price { font-size: 24px; font-weight: bold; color: #0a2540; }
  #panel .status { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px;
                   font-weight: bold; margin: 6px 0; color: #fff; }
  #panel .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 14px; margin-top: 8px; font-size: 12px; }
  #panel .grid b { color: #4a6a8a; font-weight: normal; }
  #panel #close { position: absolute; top: 10px; right: 14px; cursor: pointer; color: #6a8aaa;
                  font-size: 18px; background: none; border: none; }
  @media (max-width: 600px) {
    #hud { padding: 8px 12px; max-width: 200px; }
    #hud h1 { font-size: 16px; }
    #hud .row { font-size: 10px; }
  }
</style>
</head>
<body>
<div id="hud">
  <h1>SBR&amp;CO</h1>
  <div class="sub">LIVE TRADING ISLAND</div>
  <div class="row"><span class="dot" style="background:#11bb66"></span> Kaufzone (0.786&ndash;0.886)</div>
  <div class="row"><span class="dot" style="background:#2288ee"></span> Re-Entry (0.236&ndash;0.382)</div>
  <div class="row"><span class="dot" style="background:#ee3344"></span> Verkauf Zone (TP)</div>
  <div class="row"><span class="dot" style="background:#8899aa"></span> Neutral</div>
  <div id="updated">Verbinde mit Bot ...</div>
  <div id="err"></div>
</div>

<div id="panel">
  <button id="close">&times;</button>
  <h2 id="p-name">-</h2>
  <div class="price" id="p-price">-</div>
  <span class="status" id="p-status">-</span>
  <div class="grid" id="p-grid"></div>
</div>

<div id="tip">Tippen = Info | Streicheln = Lachen | Ziehen = drehen | Scroll/Pinch = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ================================================
// SBR&CO v4 - REALISTIC ISLAND
// Echte animierte 3D-Modelle + Schatten + Huegel
// ================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ed4f0);
scene.fog = new THREE.Fog(0x9ed4f0, 75, 190);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// LICHT (goldene Stunde Stimmung)
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x7fae5f, 0.75));
const sun = new THREE.DirectionalLight(0xfff0d0, 1.35);
sun.position.set(35, 55, 25);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -48; sun.shadow.camera.right = 48;
sun.shadow.camera.top = 48;  sun.shadow.camera.bottom = -48;
sun.shadow.camera.far = 160;
sun.shadow.bias = -0.0005;
scene.add(sun);

// ================================================
// HUEGELIGES GELAENDE
// ================================================
function terrainHeight(x, z) {
  const r = Math.hypot(x, z);
  if (r > 33) return 0;
  let h = Math.sin(x * 0.16) * Math.cos(z * 0.14) * 1.2
        + Math.sin(x * 0.31 + 2) * Math.sin(z * 0.27) * 0.5;
  // Flach am Token-Ring (r=17) und am Rand
  const ringMask = Math.min(1, Math.max(0, (Math.abs(r - 17) - 2.2) / 5));
  const edgeMask = Math.min(1, Math.max(0, (31 - r) / 5));
  const centerMask = Math.min(1, r / 4);
  return Math.max(0, h) * ringMask * edgeMask * centerMask;
}

function mat(color, rough) {
  if (rough === undefined) rough = 0.9;
  return new THREE.MeshStandardMaterial({ color, metalness: 0.02, roughness: rough });
}

// Insel-Oberflaeche (displaced)
const groundGeo = new THREE.CircleGeometry(34, 90, 0, Math.PI * 2);
groundGeo.rotateX(-Math.PI / 2);
{
  const pos = groundGeo.attributes.position;
  const colors = [];
  const c1 = new THREE.Color(0x5cbf4a), c2 = new THREE.Color(0x4aa63c), c3 = new THREE.Color(0x74cf5e);
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainHeight(x, z);
    pos.setY(i, h);
    const t = Math.min(1, h / 1.4);
    const col = c2.clone().lerp(c3, t).lerp(c1, Math.random()*0.25);
    colors.push(col.r, col.g, col.b);
  }
  groundGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  groundGeo.computeVertexNormals();
}
const ground = new THREE.Mesh(groundGeo,
  new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, metalness: 0 }));
ground.receiveShadow = true;
scene.add(ground);

// Erd-Sockel unter der Insel
const dirt = new THREE.Mesh(new THREE.CylinderGeometry(34, 25, 5, 60), mat(0x7a4e28));
dirt.position.y = -2.5;
scene.add(dirt);

// Sandweg-Ring (Token-Pfad)
const path = new THREE.Mesh(new THREE.TorusGeometry(17, 2.3, 8, 80), mat(0xdcc493, 0.95));
path.rotation.x = Math.PI/2; path.position.y = 0.03; path.scale.z = 0.015;
path.receiveShadow = true;
scene.add(path);

// Kaufzonen-Ring
const buyRing = new THREE.Mesh(new THREE.TorusGeometry(17, 0.1, 8, 100),
  new THREE.MeshBasicMaterial({ color: 0x11bb66 }));
buyRing.rotation.x = Math.PI/2; buyRing.position.y = 0.12;
scene.add(buyRing);

// ================================================
// VEGETATION (mit Schatten)
// ================================================
function castAll(obj) { obj.traverse(o => { if (o.isMesh) { o.castShadow = true; } }); }

function tree(x, z, s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22*s, 0.34*s, 1.6*s, 7), mat(0x6e4522));
  trunk.position.y = 0.8*s; g.add(trunk);
  const shades = [0x2c7a34, 0x35913f, 0x256b2d];
  for (let i = 0; i < 3; i++) {
    const crown = new THREE.Mesh(new THREE.SphereGeometry((1.35 - i*0.28)*s, 9, 9), mat(shades[i]));
    crown.position.set((Math.random()-0.5)*0.4*s, (1.9 + i*0.75)*s, (Math.random()-0.5)*0.4*s);
    crown.scale.y = 0.85; g.add(crown);
  }
  g.position.set(x, terrainHeight(x, z), z);
  castAll(g); scene.add(g);
}
function bush(x, z, s) {
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.7*s, 9, 9), mat(0x3a9a48));
  b.scale.y = 0.65; b.position.set(x, terrainHeight(x,z) + 0.3*s, z);
  b.castShadow = true; scene.add(b);
}
function rock(x, z, s) {
  const r = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6*s), mat(0x969ca4, 0.7));
  r.position.set(x, terrainHeight(x,z) + 0.28*s, z);
  r.rotation.set(Math.random(), Math.random(), 0);
  r.castShadow = true; scene.add(r);
}
function flower(x, z) {
  const y = terrainHeight(x, z);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4, 5), mat(0x2f8f3a));
  stem.position.set(x, y + 0.2, z); scene.add(stem);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.11, 6, 6),
    mat([0xff5577, 0xffcc33, 0xffffff, 0xcc66ff][Math.floor(Math.random()*4)], 0.6));
  head.position.set(x, y + 0.44, z); scene.add(head);
}
for (let i = 0; i < 18; i++) {
  const a = (i/18) * Math.PI * 2 + Math.random()*0.3;
  const r = 26.5 + Math.random()*4.5;
  tree(Math.cos(a)*r, Math.sin(a)*r, 0.9 + Math.random()*0.8);
}
for (let i = 0; i < 6; i++) {
  const a = Math.random()*Math.PI*2, r = 4 + Math.random()*9;
  tree(Math.cos(a)*r, Math.sin(a)*r, 0.7 + Math.random()*0.5);
}
for (let i = 0; i < 12; i++) {
  const a = Math.random()*Math.PI*2, r = 4 + Math.random()*24;
  if (i % 2) bush(Math.cos(a)*r, Math.sin(a)*r, 0.8 + Math.random()*0.6);
  else rock(Math.cos(a)*r, Math.sin(a)*r, 0.5 + Math.random()*0.7);
}
for (let i = 0; i < 26; i++) {
  const a = Math.random()*Math.PI*2, r = 3 + Math.random()*27;
  flower(Math.cos(a)*r, Math.sin(a)*r);
}

// Wolken
const clouds = [];
for (let i = 0; i < 7; i++) {
  const c = new THREE.Group();
  for (let j = 0; j < 4; j++) {
    const puff = new THREE.Mesh(new THREE.SphereGeometry(1.7 + Math.random(), 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.92 }));
    puff.position.set(j*1.9 - 2.6, Math.random()*0.6, Math.random()*1.5);
    c.add(puff);
  }
  c.position.set((Math.random()-0.5)*130, 24 + Math.random()*15, (Math.random()-0.5)*130);
  c.userData.speed = 0.4 + Math.random()*0.5;
  scene.add(c); clouds.push(c);
}

// ================================================
// KAMERA STEUERUNG
// ================================================
let camAngle = 0.6, camHeight = 15, camDist = 42;
let dragging = false, moved = 0, lastX = 0, lastY = 0, lastPinch = 0;

function startDrag(x, y) { dragging = true; moved = 0; lastX = x; lastY = y; }
function moveDrag(x, y) {
  if (!dragging) return;
  moved += Math.abs(x - lastX) + Math.abs(y - lastY);
  camAngle -= (x - lastX) * 0.005;
  camHeight = Math.max(4, Math.min(60, camHeight + (y - lastY) * 0.07));
  lastX = x; lastY = y;
}
addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
addEventListener('mousemove', e => { moveDrag(e.clientX, e.clientY); handleHover(e.clientX, e.clientY); });
addEventListener('mouseup', e => { if (moved < 6) handleTap(e.clientX, e.clientY); dragging = false; });
addEventListener('wheel', e => { camDist = Math.max(14, Math.min(100, camDist + e.deltaY * 0.03)); });
addEventListener('touchstart', e => {
  if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
  if (e.touches.length === 2)
    lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
}, { passive: false });
addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
    handleHover(e.touches[0].clientX, e.touches[0].clientY);
  }
  if (e.touches.length === 2) {
    const p = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    camDist = Math.max(14, Math.min(100, camDist - (p - lastPinch) * 0.08));
    lastPinch = p;
  }
}, { passive: false });
addEventListener('touchend', e => {
  if (moved < 10 && e.changedTouches.length === 1)
    handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  dragging = false;
});
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ================================================
// ECHTE 3D-MODELLE LADEN (per CDN, animiert!)
// ================================================
const loader = new THREE.GLTFLoader();
const MODEL_BASE = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/models/gltf/';
const mixers = [];
const critters = [];

function tint(root, color, dark) {
  root.traverse(o => {
    if (o.isMesh) {
      o.castShadow = true;
      if (o.material) {
        o.material = o.material.clone();
        if (color) o.material.color = new THREE.Color(color);
        if (dark) { o.material.color.multiplyScalar(dark); }
      }
    }
  });
}

function playClip(gltf, root, nameHint) {
  if (!gltf.animations || !gltf.animations.length) return null;
  const mixer = new THREE.AnimationMixer(root);
  let clip = gltf.animations.find(a => nameHint && a.name.toLowerCase().includes(nameHint));
  if (!clip) clip = gltf.animations[0];
  mixer.clipAction(clip).play();
  mixers.push(mixer);
  return mixer;
}

// --- VOEGEL (Flamingo, Papagei, Storch - echte Flug-Animationen!) ---
function spawnBird(file, scale, height) {
  loader.load(MODEL_BASE + file, gltf => {
    const wrap = new THREE.Group();
    const model = gltf.scene;
    model.scale.setScalar(scale);
    model.rotation.y = Math.PI / 2;
    tint(model, null);
    wrap.add(model);
    playClip(gltf, model, 'fly');
    wrap.userData = {
      type: 'bird',
      angle: Math.random() * Math.PI * 2,
      radius: 19 + Math.random() * 13,
      height: height + Math.random() * 4,
      speed: 0.22 + Math.random() * 0.25
    };
    scene.add(wrap);
    critters.push(wrap);
  });
}
spawnBird('Flamingo.glb', 0.02, 9);
spawnBird('Parrot.glb',   0.02, 7);
spawnBird('Stork.glb',    0.02, 11);

// --- BABY-REHE (getoentes Pferd-Modell, klein = Rehkitz) ---
function spawnDeer() {
  loader.load(MODEL_BASE + 'Horse.glb', gltf => {
    const wrap = new THREE.Group();
    const model = gltf.scene;
    model.scale.setScalar(0.008);
    model.rotation.y = Math.PI / 2;
    tint(model, 0xd9a35f);
    wrap.add(model);
    playClip(gltf, model, null);
    wrap.userData = {
      type: 'walker',
      x: 0, z: 0, dir: Math.random()*Math.PI*2,
      speed: 1.0 + Math.random()*0.6,
      turnT: 0
    };
    placeWalker(wrap);
    scene.add(wrap);
    critters.push(wrap);
  });
}
spawnDeer(); spawnDeer(); spawnDeer();

// --- NINJAS (Soldat-Modell schwarz getoent + Schwert + SALTOS!) ---
function spawnNinja() {
  loader.load(MODEL_BASE + 'Soldier.glb', gltf => {
    const wrap = new THREE.Group();
    const model = gltf.scene;
    model.scale.setScalar(1.15);
    model.rotation.y = Math.PI;
    tint(model, null, 0.22); // dunkel = Ninja
    wrap.add(model);
    // Rotes Stirnband
    const band = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.03, 6, 16), mat(0xdd2233, 0.5));
    band.rotation.x = Math.PI/2 - 0.15; band.position.y = 1.62;
    wrap.add(band);
    // SCHWERT
    const sword = new THREE.Group();
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.1),
      new THREE.MeshStandardMaterial({ color: 0xd8e4f0, metalness: 0.9, roughness: 0.2 }));
    blade.position.y = 0.5; sword.add(blade);
    const hilt = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.05), mat(0xcc9933, 0.4));
    sword.add(hilt);
    sword.position.set(0.35, 1.05, 0.12);
    sword.rotation.z = -0.5;
    castAll(sword);
    wrap.add(sword);

    playClip(gltf, model, 'run');
    wrap.userData = {
      type: 'ninja', sword,
      x: 0, z: 0, dir: Math.random()*Math.PI*2,
      speed: 2.2 + Math.random()*1.0,
      turnT: 0,
      flip: 0, flipCooldown: 2 + Math.random()*4
    };
    placeWalker(wrap);
    scene.add(wrap);
    critters.push(wrap);
  });
}
spawnNinja(); spawnNinja(); spawnNinja();

// --- WOELFE (grau getoentes Modell, schneller) ---
function spawnWolf() {
  loader.load(MODEL_BASE + 'Horse.glb', gltf => {
    const wrap = new THREE.Group();
    const model = gltf.scene;
    model.scale.setScalar(0.006);
    model.rotation.y = Math.PI / 2;
    tint(model, 0x6a7078);
    wrap.add(model);
    // Buschiger Wolfsschwanz
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.6, 6), mat(0x565c64));
    tail.position.set(0, 0.75, -0.85); tail.rotation.x = -1.2;
    tail.castShadow = true;
    wrap.add(tail);
    playClip(gltf, model, null);
    wrap.userData = {
      type: 'walker',
      x: 0, z: 0, dir: Math.random()*Math.PI*2,
      speed: 1.8 + Math.random()*0.9,
      turnT: 0
    };
    placeWalker(wrap);
    scene.add(wrap);
    critters.push(wrap);
  });
}
spawnWolf(); spawnWolf();

function placeWalker(g) {
  const a = Math.random()*Math.PI*2;
  const r = 5 + Math.random()*23;
  g.userData.x = Math.cos(a)*r;
  g.userData.z = Math.sin(a)*r;
  g.position.set(g.userData.x, terrainHeight(g.userData.x, g.userData.z), g.userData.z);
}

// ================================================
// GESICHT + TOKEN-MATERIAL
// ================================================
function addFace(group, y, z, s) {
  if (s === undefined) s = 1;
  const eyeGeo = new THREE.SphereGeometry(0.13 * s, 8, 8);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x0a1020 });
  const e1 = new THREE.Mesh(eyeGeo, eyeMat); e1.position.set(-0.28*s, y, z);
  const e2 = new THREE.Mesh(eyeGeo, eyeMat); e2.position.set( 0.28*s, y, z);
  const mouth = new THREE.Mesh(
    new THREE.TorusGeometry(0.26*s, 0.05*s, 8, 16, Math.PI),
    new THREE.MeshBasicMaterial({ color: 0x0a1020 })
  );
  mouth.position.set(0, y - 0.32*s, z);
  mouth.rotation.z = Math.PI;
  group.add(e1, e2, mouth);
}
function tmat(color, emissiveScale) {
  if (emissiveScale === undefined) emissiveScale = 0.15;
  const m = new THREE.MeshStandardMaterial({ color, metalness: 0.25, roughness: 0.5 });
  m.emissive = new THREE.Color(color).multiplyScalar(emissiveScale);
  return m;
}

// ================================================
// TOKEN FIGUREN
// ================================================
function buildFigure(symbol) {
  const g = new THREE.Group();
  switch (symbol) {
    case "JUP": {
      const p = new THREE.Mesh(new THREE.SphereGeometry(1.2, 20, 20), tmat(0xd8a06a));
      p.position.y = 1.6; g.add(p);
      const ring = new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.12, 8, 40), tmat(0xeecfa0));
      ring.rotation.x = Math.PI/2.4; ring.position.y = 1.6; g.add(ring);
      addFace(g, 1.8, 1.12, 1);
      break; }
    case "PENGUINS": {
      const body = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), tmat(0x20242c));
      body.scale.y = 1.35; body.position.y = 1.35; g.add(body);
      const belly = new THREE.Mesh(new THREE.SphereGeometry(0.78, 16, 16), tmat(0xf0f4f8, 0.08));
      belly.scale.set(0.9, 1.2, 0.6); belly.position.set(0, 1.25, 0.42); g.add(belly);
      const beak = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.5, 8), tmat(0xffaa33));
      beak.rotation.x = Math.PI/2; beak.position.set(0, 1.85, 1.0); g.add(beak);
      const f1 = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), tmat(0xffaa33));
      f1.scale.set(1.4, 0.4, 1.8); f1.position.set(-0.4, 0.1, 0.15); g.add(f1);
      const f2 = f1.clone(); f2.position.x = 0.4; g.add(f2);
      addFace(g, 2.15, 0.88, 0.8);
      break; }
    case "WORLD": {
      const globe = new THREE.Mesh(new THREE.SphereGeometry(1.3, 14, 14),
        new THREE.MeshStandardMaterial({ color: 0x2277cc, wireframe: true }));
      globe.position.y = 1.7; g.add(globe);
      const core = new THREE.Mesh(new THREE.SphereGeometry(1.15, 16, 16), tmat(0x1a4a8a));
      core.position.y = 1.7; g.add(core);
      addFace(g, 1.9, 1.1, 1);
      g.userData.spin = true;
      break; }
    case "SOLANGELES": {
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.24, 2.2, 8), tmat(0x8a5a30));
      trunk.position.y = 1.1; g.add(trunk);
      for (let i = 0; i < 5; i++) {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.22, 1.4, 6), tmat(0x22aa55));
        const a = (i/5) * Math.PI * 2;
        leaf.position.set(Math.cos(a)*0.6, 2.4, Math.sin(a)*0.6);
        leaf.rotation.set(Math.sin(a)*1.2, 0, Math.cos(a)*1.2);
        g.add(leaf);
      }
      const sunb = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), tmat(0xffcc33, 0.7));
      sunb.position.set(1.1, 3.0, -0.4); g.add(sunb);
      addFace(g, 1.4, 0.26, 0.7);
      break; }
    case "HYPE": {
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 1.8, 12), tmat(0xdde4ee, 0.1));
      body.position.y = 1.5; g.add(body);
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.9, 12), tmat(0xff5566));
      nose.position.y = 2.85; g.add(nose);
      for (let i = 0; i < 3; i++) {
        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.5), tmat(0xff5566));
        const a = (i/3) * Math.PI * 2;
        fin.position.set(Math.cos(a)*0.6, 0.65, Math.sin(a)*0.6);
        fin.rotation.y = -a; g.add(fin);
      }
      const flame = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffaa22 }));
      flame.position.y = 0.35; flame.rotation.x = Math.PI; g.add(flame);
      g.userData.flame = flame;
      addFace(g, 1.7, 0.55, 0.75);
      break; }
    case "PUMP": {
      const cap = new THREE.Mesh(new THREE.SphereGeometry(0.85, 16, 16), tmat(0x33cc77));
      cap.scale.set(1, 1.35, 1); cap.position.y = 1.6; cap.rotation.z = 0.45; g.add(cap);
      const cap2 = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 16), tmat(0xffffff, 0.08));
      cap2.position.set(0.5, 2.15, 0); g.add(cap2);
      addFace(g, 1.5, 0.78, 0.85);
      break; }
    case "CLAW": {
      for (let i = 0; i < 3; i++) {
        const claw = new THREE.Mesh(new THREE.ConeGeometry(0.28, 1.6, 6), tmat(0xcc3344));
        claw.position.set((i-1)*0.55, 2.0, 0);
        claw.rotation.x = 0.35; claw.rotation.z = (i-1)*-0.25;
        g.add(claw);
      }
      const palm = new THREE.Mesh(new THREE.SphereGeometry(0.75, 12, 12), tmat(0xaa2233));
      palm.scale.y = 0.75; palm.position.y = 1.0; g.add(palm);
      addFace(g, 1.1, 0.68, 0.8);
      break; }
    case "AURA": {
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.9, 20, 20), tmat(0xbb66ff, 0.7));
      orb.position.y = 1.7; g.add(orb);
      for (let i = 0; i < 2; i++) {
        const r = new THREE.Mesh(new THREE.TorusGeometry(1.4 + i*0.3, 0.05, 8, 40),
          new THREE.MeshBasicMaterial({ color: 0xdd99ff }));
        r.position.y = 1.7; r.rotation.x = Math.PI/2 + (i ? 0.6 : -0.4);
        g.add(r);
      }
      g.userData.spin = true;
      addFace(g, 1.85, 0.82, 0.9);
      break; }
    case "BOME": {
      const b = new THREE.Mesh(new THREE.SphereGeometry(1.1, 16, 16), tmat(0x2a2e38));
      b.position.y = 1.3; g.add(b);
      const top = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.4, 8), tmat(0x555c68));
      top.position.y = 2.45; g.add(top);
      const spark = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffcc33 }));
      spark.position.set(0.15, 2.85, 0); g.add(spark);
      g.userData.spark = spark;
      addFace(g, 1.45, 1.0, 0.95);
      break; }
    case "JOTCHUA": {
      const body = new THREE.Mesh(new THREE.SphereGeometry(0.85, 14, 14), tmat(0xd9a35f));
      body.scale.set(1.15, 0.95, 1.3); body.position.y = 0.95; g.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.65, 14, 14), tmat(0xe4b276));
      head.position.set(0, 1.95, 0.55); g.add(head);
      const snout = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 10), tmat(0xf2d3a4, 0.08));
      snout.scale.set(1, 0.7, 1); snout.position.set(0, 1.8, 1.1); g.add(snout);
      const e1 = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.6, 6), tmat(0xb9834a));
      e1.position.set(-0.42, 2.6, 0.42); e1.rotation.z = 0.3; g.add(e1);
      const e2 = e1.clone(); e2.position.x = 0.42; e2.rotation.z = -0.3; g.add(e2);
      const tail = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.8, 6), tmat(0xb9834a));
      tail.position.set(0, 1.35, -1.0); tail.rotation.x = -1.0; g.add(tail);
      g.userData.tail = tail;
      addFace(g, 2.1, 1.12, 0.7);
      break; }
    case "USELESS": {
      const can = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.6, 1.7, 14), tmat(0x7a8794));
      can.position.y = 1.1; g.add(can);
      const lid = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.18, 14), tmat(0x9aa7b4));
      lid.position.y = 2.05; g.add(lid);
      const handle = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.05, 8, 16, Math.PI), tmat(0x9aa7b4));
      handle.position.y = 2.2; g.add(handle);
      addFace(g, 1.3, 0.78, 0.85);
      break; }
    default: {
      const box = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), tmat(0x8899aa));
      box.position.y = 1.2; g.add(box);
      addFace(g, 1.4, 0.72, 0.9);
    }
  }
  castAll(g);
  return g;
}

// ================================================
// TOKENS
// ================================================
const towers = {};
const STATUS_COLORS = { KAUFZONE: 0x11bb66, REENTRY: 0x2288ee, VERKAUF: 0xee3344, NEUTRAL: 0x8899aa };
const STATUS_LABEL  = { KAUFZONE: "EINSTIEG", REENTRY: "RE-ENTRY", VERKAUF: "VERKAUF ZONE", NEUTRAL: "Neutral" };

function makeLabel() {
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 96;
  const tex = new THREE.CanvasTexture(cv);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(8, 1.5, 1);
  sprite.userData = { cv, ctx: cv.getContext('2d'), tex };
  return sprite;
}
function updateLabel(sprite, text, color) {
  const { cv, ctx, tex } = sprite.userData;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = 'rgba(255,255,255,0.88)'; ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.strokeRect(3, 3, cv.width-6, cv.height-6);
  ctx.fillStyle = '#12304f'; ctx.font = 'bold 42px monospace';
  ctx.fillText(text, 18, 62);
  tex.needsUpdate = true;
}
function fmtPrice(p) {
  if (p >= 1) return '$' + p.toFixed(3);
  if (p >= 0.001) return '$' + p.toFixed(5);
  return '$' + p.toFixed(8);
}

function buildToken(symbol, index, total) {
  const angle = (index / total) * Math.PI * 2;
  const r = 17;
  const x = Math.cos(angle) * r, z = Math.sin(angle) * r;

  const fig = buildFigure(symbol);
  fig.position.set(x, 0, z);
  fig.lookAt(0, 0, 0);
  scene.add(fig);

  const podest = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 2.1, 0.35, 18), tmat(0xe9dcb6, 0.03));
  podest.position.set(x, 0.17, z);
  podest.castShadow = true; podest.receiveShadow = true;
  scene.add(podest);

  const glow = new THREE.Mesh(
    new THREE.CylinderGeometry(2.2, 2.2, 0.08, 24),
    new THREE.MeshBasicMaterial({ color: 0x8899aa, transparent: true, opacity: 0.5 })
  );
  glow.position.set(x, 0.38, z); scene.add(glow);

  const label = makeLabel();
  label.position.set(x, 4.9, z); scene.add(label);
  updateLabel(label, symbol, '#8899aa');

  towers[symbol] = {
    fig, glow, label, angle,
    targetColor: new THREE.Color(0x8899aa),
    pulse: 0, laugh: 0, data: null
  };
}

// ================================================
// LACH-PARTIKEL
// ================================================
const particles = [];
function spawnLaugh(pos) {
  const cv = document.createElement('canvas'); cv.width = 128; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#ff7700'; ctx.font = 'bold 40px monospace';
  ctx.fillText(Math.random() < 0.5 ? 'HAHA' : 'hihi', 4, 44);
  const tex = new THREE.CanvasTexture(cv);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  s.position.copy(pos);
  s.position.x += (Math.random()-0.5)*1.5;
  s.position.y += 2.5 + Math.random();
  s.position.z += (Math.random()-0.5)*1.5;
  s.scale.set(2.4, 1.2, 1);
  scene.add(s);
  particles.push({ s, life: 1.0 });
}

// ================================================
// RAYCASTING (Tippen + Streicheln)
// ================================================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let lastLaughTime = 0;

function pickToken(x, y) {
  pointer.x = (x / innerWidth) * 2 - 1;
  pointer.y = -(y / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  for (const sym in towers) {
    const hits = raycaster.intersectObject(towers[sym].fig, true);
    if (hits.length > 0) return sym;
  }
  return null;
}
function handleHover(x, y) {
  const sym = pickToken(x, y);
  if (sym && performance.now() - lastLaughTime > 250) {
    towers[sym].laugh = 1.0;
    spawnLaugh(towers[sym].fig.position);
    lastLaughTime = performance.now();
  }
}
function handleTap(x, y) {
  const sym = pickToken(x, y);
  if (sym) openPanel(sym);
}

// ================================================
// INFO PANEL
// ================================================
const panel = document.getElementById('panel');
document.getElementById('close').onclick = () => panel.classList.remove('open');

function openPanel(sym) {
  const t = towers[sym];
  if (!t || !t.data) return;
  const d = t.data;
  const col = '#' + t.targetColor.getHexString();
  document.getElementById('p-name').textContent = sym;
  document.getElementById('p-name').style.color = col;
  document.getElementById('p-price').textContent = fmtPrice(d.price);
  const st = document.getElementById('p-status');
  st.textContent = STATUS_LABEL[d.status] || d.status;
  st.style.background = col;
  const rows = [
    ['RSI', d.rsi != null ? d.rsi.toFixed(1) : '?'],
    ['24h', d.change != null ? (d.change >= 0 ? '+' : '') + d.change.toFixed(2) + '%' : '?'],
    ['Zone Abstand', (d.zone_dist_pct >= 0 ? '+' : '') + d.zone_dist_pct.toFixed(1) + '%'],
    ['5d High', fmtPrice(d.high)],
    ['5d Low', fmtPrice(d.low)],
    ['Fibo 0.618', fmtPrice(d.fibo['0.618'])],
    ['Fibo 0.786', fmtPrice(d.fibo['0.786'])],
    ['Fibo 0.886', fmtPrice(d.fibo['0.886'])],
  ];
  for (const k in d.targets) rows.push([k, fmtPrice(d.targets[k])]);
  document.getElementById('p-grid').innerHTML =
    rows.map(r => '<div><b>' + r[0] + '</b></div><div>' + r[1] + '</div>').join('');
  panel.classList.add('open');
}

// ================================================
// STATUS LADEN
// ================================================
async function loadStatus() {
  try {
    const res = await fetch('status.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('updated').textContent = 'Bot Update: ' + data.updated;
    document.getElementById('err').style.display = 'none';
    const tokens = data.tokens || [];
    tokens.forEach((t, i) => {
      if (!towers[t.symbol]) buildToken(t.symbol, i, tokens.length);
      const tw = towers[t.symbol];
      tw.data = t;
      const col = STATUS_COLORS[t.status] || 0x8899aa;
      tw.targetColor = new THREE.Color(col);
      tw.pulse = (t.status !== 'NEUTRAL') ? 1 : 0;
      const d = t.zone_dist_pct;
      updateLabel(tw.label, t.symbol + ' ' + fmtPrice(t.price) + ' (' + (d>=0?'+':'') + d.toFixed(1) + '%)',
        '#' + tw.targetColor.getHexString());
    });
  } catch (e) {
    const err = document.getElementById('err');
    err.style.display = 'block';
    err.textContent = 'Warte auf Bot-Daten (status.json) ...';
  }
}
loadStatus();
setInterval(loadStatus, 15000);

// ================================================
// ANIMATION
// ================================================
const clock = new THREE.Clock();
let t0 = 0;
function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min((t - t0) / 1000, 0.1); t0 = t;
  const delta = clock.getDelta();

  // Modell-Animationen (Fluegelschlag, Laufen)
  mixers.forEach(m => m.update(delta));

  if (!dragging) camAngle += dt * 0.035;
  camera.position.set(Math.cos(camAngle)*camDist, camHeight, Math.sin(camAngle)*camDist);
  camera.lookAt(0, 2.2, 0);

  buyRing.material.color.setHSL(0.4, 0.9, 0.42 + Math.sin(t*0.002)*0.12);

  clouds.forEach(c => {
    c.position.x += c.userData.speed * dt;
    if (c.position.x > 85) c.position.x = -85;
  });

  // TOKEN FIGUREN
  for (const sym in towers) {
    const tw = towers[sym];
    const fig = tw.fig;
    const bob = Math.sin(t*0.0015 + tw.angle*5) * 0.1 + 0.35;

    if (tw.laugh > 0) {
      tw.laugh = Math.max(0, tw.laugh - dt * 1.2);
      const l = tw.laugh;
      fig.rotation.z = Math.sin(t * 0.03) * 0.25 * l;
      const squash = 1 + Math.sin(t * 0.035) * 0.18 * l;
      fig.scale.set(2 - squash, squash, 2 - squash);
      fig.position.y = bob + Math.abs(Math.sin(t * 0.02)) * 1.2 * l;
    } else {
      fig.rotation.z *= 0.9;
      fig.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
      fig.position.y = bob;
    }

    if (fig.userData.spin) fig.rotation.y += dt * 0.6;
    if (fig.userData.tail) fig.userData.tail.rotation.z = Math.sin(t*0.008) * 0.5;
    if (fig.userData.flame) fig.userData.flame.scale.y = 1 + Math.sin(t*0.02)*0.35;
    if (fig.userData.spark) fig.userData.spark.material.color.setHSL(0.1, 1, 0.5 + Math.sin(t*0.02)*0.3);

    tw.glow.material.color.lerp(tw.targetColor, 0.08);
    if (tw.pulse > 0) {
      tw.glow.material.opacity = 0.5 + Math.abs(Math.sin(t * 0.004)) * 0.4;
      tw.glow.scale.setScalar(1 + Math.sin(t * 0.004) * 0.18);
    } else {
      tw.glow.material.opacity = 0.4;
      tw.glow.scale.setScalar(1);
    }
  }

  // BEWOHNER
  critters.forEach(c => {
    const u = c.userData;
    if (u.type === 'bird') {
      u.angle += u.speed * dt * 0.35;
      const x = Math.cos(u.angle) * u.radius;
      const z = Math.sin(u.angle) * u.radius;
      const y = u.height + Math.sin(t*0.0018 + u.radius) * 1.6;
      c.position.set(x, y, z);
      c.rotation.y = -u.angle;
    }
    else {
      u.turnT -= dt;
      if (u.turnT <= 0) {
        u.dir += (Math.random()-0.5) * 1.6;
        u.turnT = 2 + Math.random()*3;
      }
      const r = Math.hypot(u.x, u.z);
      if (r > 27) u.dir = Math.atan2(-u.z, -u.x);
      if (Math.abs(r - 17) < 3.4) u.dir += dt * 2.5;

      u.x += Math.cos(u.dir) * u.speed * dt;
      u.z += Math.sin(u.dir) * u.speed * dt;
      c.position.x = u.x;
      c.position.z = u.z;
      c.rotation.y = -u.dir + Math.PI/2;
      const groundY = terrainHeight(u.x, u.z);

      if (u.type === 'ninja') {
        u.flipCooldown -= dt;
        if (u.flipCooldown <= 0 && u.flip <= 0) {
          u.flip = 1.0;
          u.flipCooldown = 3 + Math.random()*5;
        }
        if (u.flip > 0) {
          u.flip = Math.max(0, u.flip - dt * 1.1);
          const p = 1 - u.flip;
          c.rotation.x = p * Math.PI * 2;                    // SALTO!
          c.position.y = groundY + Math.sin(p * Math.PI) * 2.4;
          u.sword.rotation.z = -0.5 - Math.sin(p * Math.PI) * 1.3;
        } else {
          c.rotation.x = 0;
          c.position.y = groundY;
          u.sword.rotation.z = -0.5 + Math.sin(t*0.005) * 0.15;
        }
      } else {
        c.position.y = groundY;
      }
    }
  });

  // Lach-Partikel
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 0.8;
    p.s.position.y += dt * 2.2;
    p.s.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { scene.remove(p.s); particles.splice(i, 1); }
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
